<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Gran Travesía de 1492</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1208;
    --parch: #f5efe0;
    --gold: #c9a84c;
    /* Colores para el efecto cristal */
    --glass-bg: rgba(255, 255, 255, 0.05);
    --glass-border: rgba(255, 255, 255, 0.1);
    --glass-fallback: rgba(26, 18, 8, 0.9); /* Para navegadores antiguos */
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--ink);
    font-family: 'Crimson Pro', serif;
    color: var(--parch);
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  /* ── Fondo: Mapa Antiguo (Se mantiene detrás) ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: 
        url('https://www.transparenttextures.com/patterns/old-map.png'), /* Textura */
        url('https://upload.wikimedia.org/wikipedia/commons/e/e4/Cantino_planisphere.jpg'); /* Mapa real histórico */
    background-size: cover;
    background-position: center;
    filter: sepia(0.8) contrast(1.2) brightness(0.4); /* Efecto envejecido y oscuro */
    z-index: 0;
  }

  /* ── Deck (Contenedor de diapositivas) ── */
  #deck {
    position: relative;
    width: 100vw;
    height: 100vh;
    z-index: 1;
  }

  .slide {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 4rem 6vw;
    opacity: 0;
    transform: translateY(40px) scale(0.97);
    transition: opacity .7s cubic-bezier(.4,0,.2,1), transform .7s cubic-bezier(.4,0,.2,1);
    pointer-events: none;
  }

  .slide.active {
    opacity: 1;
    transform: translateY(0) scale(1);
    pointer-events: all;
  }

  .slide.exit {
    opacity: 0;
    transform: translateY(-40px) scale(0.97);
    transition: opacity .5s ease, transform .5s ease;
  }

  /* ── NUEVO: Efecto Cristal (Glassmorphism) en Paneles ── */
  .glass-panel {
    background: var(--glass-bg);
    backdrop-filter: blur(12px) saturate(180%);
    -webkit-backdrop-filter: blur(12px) saturate(180%);
    border: 1px solid var(--glass-border);
    border-radius: 15px;
    box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
    padding: 2.5rem;
    max-width: 900px;
    width: 100%;
  }

  /* Soporte para navegadores que no tienen backdrop-filter */
  @supports not (backdrop-filter: blur(12px)) {
    .glass-panel { background: var(--glass-fallback); }
  }

  /* ── Portada (Slide 0) ── */
  .cover .ornament {
    font-size: 2rem;
    color: var(--gold);
    letter-spacing: .4em;
    margin-bottom: 2rem;
    opacity: .7;
    text-align: center;
  }

  .cover h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.8rem, 7vw, 6rem);
    font-weight: 700;
    text-align: center;
    line-height: 1.1;
    color: var(--parch);
    text-shadow: 0 2px 40px rgba(201, 168, 76, 0.5);
    margin-bottom: 1.5rem;
  }

  .cover h1 em {
    font-style: italic;
    color: var(--gold);
  }

  .cover p {
    font-size: 1.25rem;
    color: #b8a882;
    letter-spacing: .15em;
    text-transform: uppercase;
    font-weight: 300;
    text-align: center;
  }

  .cover .line {
    width: 120px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 2rem auto;
  }

  /* ── Diapositivas de Contenido (Hitos) ── */
  .topic-header {
    display: flex;
    align-items: baseline;
    gap: 1.5rem;
    margin-bottom: .6rem;
  }

  .topic-number {
    font-family: 'Playfair Display', serif;
    font-size: 4rem;
    font-weight: 700;
    color: var(--gold);
    opacity: .25;
    line-height: 1;
    min-width: 3.5rem;
  }

  .topic h2 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.8rem, 4vw, 3rem);
    font-weight: 700;
    font-style: italic;
    color: var(--parch);
    line-height: 1.15;
  }

  .topic h2 .date {
    display: block;
    font-size: .55em;
    font-style: normal;
    font-weight: 400;
    color: var(--gold);
    letter-spacing: .12em;
    text-transform: uppercase;
    margin-top: .3rem;
  }

  .divider {
    width: 100%;
    height: 1px;
    background: linear-gradient(90deg, var(--gold) 0%, transparent 100%);
    margin: 1.2rem 0;
    opacity: .4;
  }

  .meaning {
    font-size: clamp(1rem, 1.8vw, 1.22rem);
    color: #d9cdb4;
    line-height: 1.8;
    margin-bottom: 1.4rem;
    font-weight: 300;
  }

  .meaning strong { color: var(--gold); font-weight: 400; }

  .quote-box {
    border-left: 2px solid var(--gold);
    padding-left: 1.2rem;
    margin-bottom: 1.2rem;
    font-style: italic;
    color: #b8a882;
    font-size: 0.95rem;
  }

  /* ── Marcadores visuales de Mapa (Coordenadas) ── */
  .map-marker {
    position: absolute;
    bottom: 2rem;
    right: 2rem;
    font-size: 0.7rem;
    color: #5a5040;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* ── Navegación (Mantenida exactamente igual) ── */
  #progress {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: #ffffff0a;
    z-index: 100;
  }

  #progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), #e8c97a);
    transition: width .6s ease;
    box-shadow: 0 0 10px var(--gold);
  }

  #nav {
    position: fixed;
    bottom: 2.5rem;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 1.5rem;
    z-index: 100;
    /* Efecto cristal en la barra de navegación */
    background: rgba(14, 11, 6, 0.5);
    backdrop-filter: blur(8px);
    border: 1px solid var(--glass-border);
    border-radius: 50px;
    padding: .7rem 1.6rem;
  }

  #nav button {
    background: none;
    border: none;
    color: var(--gold);
    font-size: 1.2rem;
    cursor: pointer;
    padding: .3rem .7rem;
    border-radius: 50px;
    transition: background .2s, color .2s;
    line-height: 1;
  }

  #nav button:hover { background: rgba(201, 168, 76, 0.2); }
  #nav button:disabled { opacity: .2; cursor: default; }

  #counter {
    font-family: 'Playfair Display', serif;
    font-size: .9rem;
    color: #8a7d60;
    min-width: 4rem;
    text-align: center;
  }

  /* ── Índice (Mantenido exactamente igual) ── */
  #index-btn {
    position: fixed;
    top: 1.5rem;
    right: 1.8rem;
    z-index: 200;
    /* Efecto cristal */
    background: rgba(14, 11, 6, 0.5);
    backdrop-filter: blur(8px);
    border: 1px solid var(--glass-border);
    color: var(--gold);
    font-size: .75rem;
    letter-spacing: .12em;
    text-transform: uppercase;
    padding: .5rem 1.2rem;
    border-radius: 50px;
    cursor: pointer;
    transition: background .2s;
  }
  #index-btn:hover { background: rgba(201, 168, 76, 0.2); }

  #index-modal {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.8);
    backdrop-filter: blur(16px);
    z-index: 300;
    display: none;
    align-items: center;
    justify-content: center;
  }
  #index-modal.open { display: flex; }

  .index-inner {
    /* Efecto cristal en el modal */
    background: rgba(20, 16, 9, 0.7);
    border: 1px solid var(--glass-border);
    backdrop-filter: blur(10px);
    border-radius: 8px;
    padding: 2.5rem 3rem;
    max-width: 700px;
    width: 90vw;
    max-height: 80vh;
    overflow-y: auto;
  }

  .index-inner h3 {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    color: var(--gold);
    margin-bottom: 1.5rem;
    text-align: center;
  }

  .index-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: .6rem;
  }

  .index-item {
    padding: .6rem 1rem;
    border: 1px solid #ffffff12;
    border-radius: 4px;
    cursor: pointer;
    transition: all .2s;
    font-size: .9rem;
    color: #c8bfa4;
    background: rgba(255, 255, 255, 0.02);
  }

  .index-item:hover {
    border-color: var(--gold);
    color: var(--gold);
    background: rgba(201, 168, 76, 0.1);
  }

  .index-item .idx-num {
    color: var(--gold);
    opacity: .5;
    font-size: .75rem;
    margin-right: .4rem;
  }

  .close-modal {
    display: block;
    margin: 1.5rem auto 0;
    background: none;
    border: 1px solid #ffffff22;
    color: #8a7d60;
    padding: .5rem 2rem;
    border-radius: 50px;
    cursor: pointer;
    transition: all .2s;
    font-size: .85rem;
  }
  .close-modal:hover { border-color: var(--gold); color: var(--gold); }

  /* Título de la web fijo arriba a la izquierda */
  .slide-label {
    position: fixed;
    top: 1.5rem;
    left: 1.8rem;
    font-size: .72rem;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: #a09070;
    z-index: 100;
    text-shadow: 0 0 5px rgba(0,0,0,0.5);
  }

  /* Pista de teclado */
  .hint {
    position: fixed;
    bottom: 6.5rem;
    left: 50%;
    transform: translateX(-50%);
    font-size: .7rem;
    color: #5a5040;
    letter-spacing: .1em;
    z-index: 100;
  }

</style>
</head>
<body>

<div class="slide-label">La Gran Travesía de 1492</div>

<button id="index-btn">Índice ▾</button>

<div id="index-modal">
  <div class="index-inner">
    <h3>Diario de a Bordo</h3>
    <div class="index-grid" id="index-grid"></div>
    <button class="close-modal" onclick="closeIndex()">Cerrar</button>
  </div>
</div>

<div id="deck"></div>

<div id="progress"><div id="progress-bar"></div></div>

<div id="nav">
  <button id="prev" onclick="move(-1)">←</button>
  <span id="counter">0 / 0</span>
  <button id="next" onclick="move(1)">→</button>
</div>

<p class="hint">← → teclas o botones para navegar</p>

<script>
// Base de datos de la travesía (Contenido de Colón)
const HITOS = [
  {
    title: "El Proyecto de las Indias",
    date: "1480 - 1492",
    meaning: "Cristóbal Colón, un navegante genovés, madura una idea revolucionaria: llegar a las ricas tierras de **Cipango (Japón) y Cathay (China)** navegando hacia el **Oeste**, cruzando la 'Mar Oceana'. Tras años de rechazo en Portugal, busca el apoyo de los Reyes Católicos de España.",
    quote: "«Buscar el Levante por el Poniente» — Máxima del proyecto de Colón.",
    coord: "Lisboa / Santa Fe"
  },
  {
    title: "Las Capitulaciones de Santa Fe",
    date: "17 de Abril de 1492",
    meaning: "Se firma el acuerdo entre Colón y los Reyes Católicos. Colón recibe financiación y los títulos de **Almirante, Virrey y Gobernador** de las tierras que descubra, además de un décimo de las riquezas obtenidas. Es la luz verde para la expedición.",
    quote: "Un contrato comercial y político que cambió la historia del mundo.",
    coord: "Granada, España"
  },
  {
    title: "La Partida de Palos",
    date: "3 de Agosto de 1492",
    meaning: "La expedición, compuesta por dos carabelas (**La Pinta** y **La Niña**) y una nao (**La Santa María**), y unos 90 hombres, zarpa del puerto de Palos de la Frontera (Huelva). Comienza la travesía hacia lo desconocido.",
    quote: "«Zarpamos antes de salir el sol, con fuerte viento...» — Extracto del diario de Colón.",
    coord: "37°13'N 6°53'W"
  },
  {
    title: "Escala en Canarias",
    date: "6 Ago - 6 Sep 1492",
    meaning: "Las naves llegan a las Islas Canarias para reparaciones técnicas (especialmente en el timón de La Pinta) y para reabastecerse de víveres y agua. Es la **última tierra conocida** antes de adentrarse en el Océano Atlántico.",
    quote: "El salto definitivo hacia el abismo inexplorado.",
    coord: "28°06'N 15°24'W"
  },
  {
    title: "El Océano Desconocido",
    date: "Septiembre de 1492",
    meaning: "La flota navega semanas hacia el Oeste con vientos alisios favorables. Sin embargo, la **distancia sin ver tierra** provoca temor entre la tripulación. Se cruza el enigmático Mar de los Sargazos, lleno de algas flotantes.",
    quote: "El miedo al abismo y la leyenda de los monstruos marinos acechan.",
    coord: "Océano Atlántico"
  },
  {
    title: "La Tensión y el Motín",
    date: "10 de Octubre de 1492",
    meaning: "La desesperación alcanza su punto crítico. Tras más de un mes de navegación sin avistamientos, la tripulación, asustada por no poder regresar contra el viento, intenta sublevarse. Colón pide **tres días de margen** para encontrar tierra.",
    quote: "«Aquí la gente ya no podía sufrir...» — Tensión máxima a bordo.",
    coord: "Aprox. 24°N 70°W"
  },
  {
    title: "¡Tierra a la Vista!",
    date: "12 de Octubre de 1492",
    meaning: "A las dos de la mañana, el marinero **Rodrigo de Triana**, desde La Pinta, avista tierra. Por la mañana, desembarcan en una isla de las Bahamas, que los nativos llamaban Guanahaní. Colón la bautiza como **San Salvador**.",
    quote: "«¡Tierra! ¡Tierra!» — El grito que unió dos mundos.",
    coord: "24°01'N 74°30'W"
  },
  {
    title: "El Encuentro de Dos Mundos",
    date: "12 de Octubre de 1492",
    meaning: "Colón toma posesión de la isla en nombre de los Reyes Católicos. Tiene lugar el primer contacto pacífico con los indígenas taínos. Colón, convencido de haber llegado a Asia, los llama **'indios'**.",
    quote: "El inicio de una nueva era de intercambios, conquistas y choques culturales.",
    coord: "Guanahaní, Bahamas"
  },
  {
    title: "La Navidad y el Regreso",
    date: "Dic 149Regreso",
    meaning: "La Santa María encalla en Nochebuena en La Española (Haití). Con sus restos construyen el **Fuerte Navidad**, primer asentamiento español. Colón emprende el viaje de regreso en La Niña el 16 de enero de 1493, llevando muestras de oro, plantas y nativos.",
    quote: "El Almirante regresa para anunciar su 'victoria' a Europa.",
    coord: "La Española"
  }
];

let current = 0;

function init() {
  const deck = document.getElementById('deck');
  const grid = document.getElementById('index-grid');

  // Slide 0: Portada (Estilo Cristal)
  const cover = document.createElement('div');
  cover.className = 'slide cover active';
  cover.innerHTML = `
    <div class="glass-panel">
        <div class="ornament">🙶 ☙ 🙴</div>
        <h1>La Gran <em>Travesía</em></h1>
        <div class="line"></div>
        <p>El Primer Viaje de Colón a las Indias (1492)</p>
    </div>
  `;
  deck.appendChild(cover);

  // Generar Slides de Contenido (Hitos)
  HITOS.forEach((t, i) => {
    const slide = document.createElement('div');
    slide.className = 'slide topic';
    slide.innerHTML = `
      <div class="glass-panel">
          <div class="topic-header">
            <span class="topic-number">${(i + 1).toString().padStart(2, '0')}</span>
            <h2>${t.title} <span class="date">${t.date}</span></h2>
          </div>
          <div class="divider"></div>
          <p class="meaning">${t.meaning}</p>
          <div class="quote-box">
            <p>${t.quote}</p>
          </div>
          <div class="map-marker">${t.coord}</div>
      </div>
    `;
    deck.appendChild(slide);

    // Grid del Índice
    const idxItem = document.createElement('div');
    idxItem.className = 'index-item';
    idxItem.innerHTML = `<span class="idx-num">${i + 1}</span> ${t.title}`;
    idxItem.onclick = () => { goTo(i + 1); closeIndex(); };
    grid.appendChild(idxItem);
  });

  updateNav();
}

// Lógica de navegación (Mantenida exactamente igual)
function move(dir) {
  const slides = document.querySelectorAll('.slide');
  if (current + dir < 0 || current + dir >= slides.length) return;

  slides[current].classList.remove('active');
  slides[current].classList.add('exit');

  current += dir;

  setTimeout(() => {
    slides.forEach(s => s.classList.remove('exit'));
    slides[current].classList.add('active');
    updateNav();
  }, 50); // Tiempo breve para asegurar la transición suave
}

function goTo(index) {
  const slides = document.querySelectorAll('.slide');
  slides.forEach(s => s.classList.remove('active', 'exit'));
  current = index;
  slides[current].classList.add('active');
  updateNav();
}

function updateNav() {
  const slides = document.querySelectorAll('.slide');
  const prevBtn = document.getElementById('prev');
  const nextBtn = document.getElementById('next');
  const counterLabel = document.getElementById('counter');
  const progressBar = document.getElementById('progress-bar');

  prevBtn.disabled = current === 0;
  nextBtn.disabled = current === slides.length - 1;
  
  counterLabel.innerText = `${current} / ${slides.length - 1}`;
  
  // Barra de progreso
  const progressPercent = (current / (slides.length - 1)) * 100;
  progressBar.style.width = `${progressPercent}%`;
}

// Lógica del Índice
document.getElementById('index-btn').onclick = () => document.getElementById('index-modal').classList.add('open');
window.closeIndex = () => document.getElementById('index-modal').classList.remove('open');

// Navegación por teclado
window.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') move(1);
  if (e.key === 'ArrowLeft') move(-1);
  if (e.key === 'Escape') closeIndex();
});

// Arrancar
init();

</script>
</body>
</html>
